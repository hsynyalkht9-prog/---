<!DOCTYPE html>
<html lang="en">
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قناة عباس ملكي</title>
</head>


<style>
    body {
        background: linear-gradient(135deg, #3d815f, #2cff8b);
        height: 100vh;
    }

    h1 {
        text-align: center;
        margin: 100px auto;
        background: #347485;
        height: 40px;
        border-radius: 10px;
        border-right: 30px solid #ff891a;
    }

    .q1 {

        background: rgb(243, 243, 243);
        width: 90%;
        height: 30px;
        /* تم تقليل الارتفاع ليناسب شريط التقدم */
        border-radius: 10px;
        margin: 240px auto;
        /* حواف دائرية للشريط الخارجي */

        /* لتوسيط الشريط في منتصف الصفحة */


    }

    .q2 {
        background: rgb(40, 34, 122);
        width: 90%;
        height: 100%;
        border-radius: 10px;
        /* تم تعديل الأنميشن ليتوافق مع السرعات الجديدة في 12 ثانية تقريباً */
        animation: uyuy 12s linear forwards;

    }

    /* تحديث الأنميشن ليتوافق مع حركات السرعة والبطء التي طلبتها */
    @keyframes uyuy {
        0% {
            width: 0%;
        }

        15% {
            width: 10%;
        }

        /* طبيعي إلى 10% */
        50% {
            width: 20%;
        }

        /* يتأخر ويتباطأ للـ 20% */
        55% {
            width: 40%;
        }

        /* كبل سريع للـ 40% */
        75% {
            width: 50%;
        }

        /* شوية شوية للـ 50% */
        80% {
            width: 80%;
        }

        /* كبل سريع للـ 80% */
        95% {
            width: 90%;
        }

        /* يتباطأ شوية للـ 90% */
        100% {
            width: 100%;
        }

        /* كبل سريع للـ 100% */
    }
</style>


<body>
    <div>
        <h1>جار تنزيل قناة عباس ملكي </h1>
    </div>

    <div class="q1">

        <div class="q2">
            <div class="q3"> <span id="percent-text" style="color: #ff0000;">0%</span></div>
        </div>

    </div>

    <!-- كود الجافاسكريبت المحدث للتحكم بالسرعات والانتقال السلس -->
    <script>
        const percentSpan = document.getElementById('percent-text');

        // مصفوفة تحدد الوقت بالملي ثانية لكل نسبة مئوية لمحاكاة الحركة بدقة
        function getDelay(current) {
            if (current >= 10 && current < 20) return 350;  /* يضل يتاخر شويه لل 20 */
            if (current >= 20 && current < 40) return 25;   /* كبل سريع لل 40 */
            if (current >= 40 && current < 50) return 200;  /* شويه شويه يوصل لل 50 */
            if (current >= 50 && current < 80) return 15;   /* كبل 80 */
            if (current >= 80 && current < 90) return 150;  /* شويه لل 90 */
            if (current >= 90 && current < 100) return 30;  /* كبل لل 100 */
            return 100; // السرعة الافتراضية من 0 لـ 10
        }

        let currentPercent = 0;

        function updateProgress() {
            if (currentPercent <= 100) {
                percentSpan.innerText = currentPercent + "%";

                if (currentPercent === 100) {
                    // الانتقال فوراً عند الوصول إلى 100%
                    setTimeout(() => {
                        window.location.href = "h.html";
                    }, 300);
                    return;
                }

                currentPercent++;
                setTimeout(updateProgress, getDelay(currentPercent));
            }
        }

        // بدء التشغيل
        setTimeout(updateProgress, 100);
    </script>
</body>

</html>
